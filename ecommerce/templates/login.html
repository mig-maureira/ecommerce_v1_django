{% extends "base.html" %}
{% load static %}

{% block content %}
<section class="hero-section d-flex align-items-center" id="inicio"
    style="background-image: url('{% static 'img/hero.jpg' %}'); min-height: 100vh; background-size: cover; background-position: center;">

    <div class="hero-overlay w-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-11 col-sm-10 col-md-10 col-lg-8 col-xl-8">

                    <div class="card shadow-lg border-0 rounded-4">
                        <div class="card-body p-4 p-sm-5">
                            <h2 class="text-center mb-4">Iniciar Sesión</h2>

                            <form method="POST">
                                {% csrf_token %}
                                {{ form.as_p }}
                                <button type="submit" class="btn btn-primary w-100 mt-3">Entrar</button>
                            </form>

                            <p class="text-center mt-3 mb-0">
                                ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
