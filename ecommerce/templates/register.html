{% extends "base.html" %}
{% load static %}

{% block content %}

<section class="hero-section d-flex align-items-center" id="inicio"
  style="background-image: url('{% static 'img/img_1.jpg' %}'); min-height: 100vh; background-size: cover; background-position: center;">

  <div class="hero-overlay w-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-11 col-sm-10 col-md-10 col-lg-8 col-xl-8">

          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-sm-5">

              <h1 class="text-center h3 mb-4 fw-bold">Crear Cuenta</h1>
              <form method="POST" enctype="multipart/form-data" class="needs-validation">
                {% csrf_token %}

                <div class="registration-form-container">
                  {{ form.as_p }}
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2 mt-3 fw-bold shadow-sm">
                  Registrarme
                </button>
              </form>

              <hr class="my-4 text-muted">

              <div class="text-center small">
                <p class="mb-2">¿Ya tienes cuenta?
                  <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Inicia sesión aquí</a>
                </p>
                <a href="{% url 'index' %}" class="btn btn-outline-secondary btn-sm px-4">
                  <i class="fas fa-arrow-left me-1"></i> Volver al inicio
                </a>
              </div>

            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

</section>


{% endblock %}
