{% extends "base.html" %}
{% block content %}

<section class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card-custom p-4 p-md-5 border-top border-4 border-danger">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <i class="fas fa-exclamation-triangle fa-3x text-danger opacity-75"></i>
                    </div>
                    <span class="text-uppercase small fw-bold tracking-wider text-muted">Confirmar Acción</span>
                    <h2 class="hero-title fs-3 mt-2">¿Eliminar producto?</h2>
                </div>

                <div class="alert alert-light border-0 bg-crema p-3 mb-4">
                    <p class="mb-0 text-center">
                        Estás a punto de eliminar permanentemente: <br>
                        <strong class="text-verde">"{{ producto.nombre }}"</strong>
                    </p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger py-2 rounded-pill shadow-sm">
                            <i class="fas fa-trash-alt me-2"></i>Sí, eliminar definitivamente
                        </button>
                        <a href="{% url 'mis_productos' %}" class="btn-alma-outline text-center">
                            No, mantener producto
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

{% endblock %}
